name = "hikkInn"
compatibility_date = "2026-07-01"
pages_build_output_dir = ".vercel/output"  # set by @cloudflare/next-on-pages

# Cloudflare bindings (shapes only — values provisioned in dashboard/CI).
# Durable Object for live dispatch (Spike A logic ports here).
[[durable_objects.bindings]]
name = "DISPATCH"
class_name = "DispatchCoordinator"

[[migrations]]
tag = "v1"
new_classes = ["DispatchCoordinator"]

