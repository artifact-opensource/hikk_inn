name: CI
on:
  push:
    branches: [master]
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci || npm install
      - name: Next.js build (Cloudflare Pages target)
        run: npm run build
      - name: Upload Pages artifact
        uses: actions/upload-artifact@v4
        with:
          name: hikkInn-build
          path: .next
